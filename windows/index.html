<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <title>自我管理助手</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="app">
        <main id="main-content"></main>
        
        <nav id="bottom-nav">
            <button class="nav-item active" data-tab="add">
                <span class="nav-icon">➕</span>
                <span class="nav-label" data-i18n="tab_add">添加</span>
            </button>
            <button class="nav-item" data-tab="records">
                <span class="nav-icon">📋</span>
                <span class="nav-label" data-i18n="tab_records">记录</span>
            </button>
            <button class="nav-item" data-tab="stats">
                <span class="nav-icon">📊</span>
                <span class="nav-label" data-i18n="tab_stats">分析</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label" data-i18n="tab_settings">设置</span>
            </button>
        </nav>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
